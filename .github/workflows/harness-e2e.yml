name: Harness E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which suite to run ("all" runs everything)'
        type: choice
        required: true
        default: all
        options:
          - all
          - core
          - behavior
          - lifecycle
          - persistence
          - errors
          - pi-host
          - shared-sandbox

permissions:
  contents: read

concurrency:
  group: harness-e2e-${{ github.ref }}-${{ inputs.suite }}
  cancel-in-progress: true

jobs:
  harness-e2e:
    name: 'Harness E2E (replay)'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Replay still provisions a real Vercel sandbox, so the suite cannot run
      # without a Vercel OIDC token. Skip cleanly when the secret is unset rather
      # than failing confusingly.
      - name: Check Vercel credentials
        id: creds
        env:
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
        run: |
          if [ -n "$VERCEL_OIDC_TOKEN" ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo '::warning::VERCEL_OIDC_TOKEN is not configured; skipping the harness e2e replay suite.'
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.creds.outputs.run == 'true'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Use Node.js 22
        if: steps.creds.outputs.run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.creds.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build suite dependencies
        if: steps.creds.outputs.run == 'true'
        run: pnpm --filter "harness-e2e^..." build

      - name: Run harness e2e replay suite
        if: steps.creds.outputs.run == 'true'
        env:
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          SUITE: ${{ inputs.suite }}
        run: |
          if [ -z "$SUITE" ] || [ "$SUITE" = "all" ]; then
            echo "Running the full harness e2e replay suite"
            pnpm --filter harness-e2e test:integration
          else
            echo "Running harness e2e replay suite filtered to \"$SUITE:\""
            pnpm --filter harness-e2e test:integration -t "$SUITE:"
          fi
